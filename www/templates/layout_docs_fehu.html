<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- <title>fehu docs - raven</title> -->
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/docs.css">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <nav>
      <a href="/" class="breadcrumb-link logo-link">
        <img src="/raven.svg" alt="Raven" class="header-logo">
        raven
      </a>
      <span class="breadcrumb-separator">/</span>
      <a href="/docs/" class="breadcrumb-link">docs</a>
      <span class="breadcrumb-separator">/</span>
      <span class="breadcrumb-text color-teal">fehu <span class="rune-symbol">ᚠ</span></span>
    </nav>
  </header>

  <div class="container">
    <!-- Sidebar -->
    <nav class="sidebar">
      <!-- Library Info -->
      <div class="library-info">
        <h3 class="color-teal">fehu <span class="rune-symbol">ᚠ</span></h3>
        <p>Reinforcement learning for OCaml</p>
        <a href="/fehu/" class="color-teal">← Back to Library</a>
      </div>

      <!-- Navigation -->
      <div class="nav-section">
        <div class="nav-title">Documentation</div>
        <ul class="nav-links">
          <li><a href="/docs/fehu/">Overview</a></li>
          <li><a href="/docs/fehu/getting-started/">Getting Started</a></li>
        </ul>
      </div>

      <div class="nav-section">
        <div class="nav-title">API Reference</div>
        <ul class="nav-links" id="fehu-api-nav"></ul>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="content">
      <div id="breadcrumbs" class="breadcrumbs"></div>
      <main>
        <!-- Content will be inserted here -->
      </main>
    </div>
  </div>

  <script>
    (function () {
      var target = document.getElementById('fehu-api-nav');
      if (!target) return;
      fetch('/docs/fehu/api_nav.html')
        .then(function (response) {
          if (!response.ok) return '';
          return response.text();
        })
        .then(function (html) {
          if (!html) return;
          target.innerHTML = html;
        })
        .catch(function () {
          /* ignore errors when loading the API navigation */
        });
    })();
  </script>
</body>

</html>
